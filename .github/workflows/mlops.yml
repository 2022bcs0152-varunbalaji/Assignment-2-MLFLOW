name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-train:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Train Model
      run: |
        python src/train.py

    - name: Check model files
      run: |
        ls model/

    - name: Build Docker Image
      run: |
        docker build -t churn-mlops .

    - name: Run Container
      run: |
        docker run -d -p 8000:8000 churn-mlops
        sleep 10

    - name: Test API
      run: |
        curl -X GET http://localhost:8000/